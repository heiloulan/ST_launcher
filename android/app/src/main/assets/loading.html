<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #1a1a2e;
            color: #e94560;
            font-family: sans-serif;
        }

        .spinner {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-top: 4px solid #e94560;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        .log-btn {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #aaa;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 8px 16px;
            font-size: 13px;
            cursor: pointer;
        }

        .log-btn:active {
            background: rgba(255, 255, 255, 0.2);
        }

        .log-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 999;
            flex-direction: column;
        }

        .log-modal.show {
            display: flex;
        }

        .log-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            background: #16213e;
        }

        .log-header span {
            color: #e94560;
            font-size: 16px;
        }

        .log-close {
            color: #aaa;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 0 8px;
        }

        .log-content {
            flex: 1;
            overflow-y: auto;
            padding: 12px;
            font-family: monospace;
            font-size: 12px;
            color: #0f0;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
        }
    </style>
</head>

<body>
    <div class="spinner"></div>
    <div>少女祈祷中…</div>
    <div style="font-size: 14px; color: #aaa; margin-top: 10px;">第一次启动会消耗一分钟以上用于解压</div>

    <button class="log-btn" onclick="openLog()">查看日志</button>

    <div class="log-modal" id="logModal">
        <div class="log-header">
            <span>服务器日志</span>
            <button class="log-close" onclick="closeLog()">✕</button>
        </div>
        <div class="log-content" id="logContent">加载中...</div>
    </div>

    <script>
        var logInterval = null;
        function openLog() {
            document.getElementById('logModal').classList.add('show');
            refreshLog();
            logInterval = setInterval(refreshLog, 2000);
        }
        function closeLog() {
            document.getElementById('logModal').classList.remove('show');
            if (logInterval) { clearInterval(logInterval); logInterval = null; }
        }
        function refreshLog() {
            if (window.Android && window.Android.getLog) {
                var log = window.Android.getLog();
                var el = document.getElementById('logContent');
                el.textContent = log || '暂无日志';
                el.scrollTop = el.scrollHeight;
            }
        }
    </script>
</body>

</html>
